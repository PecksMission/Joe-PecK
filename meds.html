<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recovery Meds</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0f18;
    --surface: #131720;
    --surface2: #1a2030;
    --border: rgba(255,255,255,0.07);
    --text: #e4e8f0;
    --muted: #6b7590;
    --dim: #3a4058;
    --accent: #c8a96e;
    --red: #e05c5c;
    --green: #4caf82;
    --blue: #5b9cf6;
    --yellow: #e8c44a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

/* CLOCK HERO */
.clock-hero {
background: var(–surface);
border-bottom: 1px solid var(–border);
padding: 32px 24px 28px;
text-align: center;
position: relative;
overflow: hidden;
}
.clock-hero::before {
content: ‘’;
position: absolute;
top: -60px; left: 50%;
transform: translateX(-50%);
width: 300px; height: 300px;
background: radial-gradient(circle, rgba(200,169,110,0.08) 0%, transparent 70%);
pointer-events: none;
}
.clock-label {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 0.2em;
color: var(–muted);
text-transform: uppercase;
margin-bottom: 8px;
}
.clock-time {
font-family: ‘DM Mono’, monospace;
font-size: clamp(52px, 12vw, 80px);
font-weight: 600;
color: var(–text);
letter-spacing: -0.02em;
line-height: 1;
margin-bottom: 6px;
}
.clock-time .ampm {
font-size: 0.35em;
color: var(–accent);
vertical-align: super;
margin-left: 6px;
font-weight: 400;
letter-spacing: 0.1em;
}
.clock-date {
font-family: ‘DM Mono’, monospace;
font-size: 13px;
color: var(–muted);
margin-bottom: 16px;
}
.day-chip {
display: inline-flex;
align-items: center;
gap: 8px;
background: rgba(200,169,110,0.1);
border: 1px solid rgba(200,169,110,0.2);
border-radius: 20px;
padding: 6px 18px;
font-family: ‘DM Mono’, monospace;
font-size: 12px;
color: var(–accent);
}

/* TABS */
.tabs {
display: flex;
background: var(–surface);
border-bottom: 1px solid var(–border);
overflow-x: auto;
-webkit-overflow-scrolling: touch;
}
.tab {
flex: 1;
min-width: 90px;
padding: 14px 8px;
text-align: center;
font-size: 13px;
font-weight: 500;
color: var(–muted);
cursor: pointer;
border: none;
background: none;
border-bottom: 2px solid transparent;
transition: all 0.2s;
font-family: ‘DM Sans’, sans-serif;
white-space: nowrap;
}
.tab:hover { color: var(–text); }
.tab.active { color: var(–accent); border-bottom-color: var(–accent); }

/* CONTENT */
.content { max-width: 680px; margin: 0 auto; padding: 24px 16px 40px; }

/* NOW SECTION */
.section-label {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 0.18em;
color: var(–muted);
text-transform: uppercase;
margin-bottom: 12px;
display: flex;
align-items: center;
gap: 10px;
}
.section-label::after {
content: ‘’;
flex: 1;
height: 1px;
background: var(–border);
}
.pulse {
display: inline-block;
width: 7px; height: 7px;
background: var(–green);
border-radius: 50%;
animation: pulse 2s infinite;
flex-shrink: 0;
}
@keyframes pulse {
0%,100% { opacity: 1; transform: scale(1); }
50% { opacity: 0.4; transform: scale(0.8); }
}

/* MED ITEM */
.med-item {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 12px;
padding: 14px 16px;
margin-bottom: 8px;
display: flex;
align-items: flex-start;
gap: 14px;
transition: border-color 0.2s;
}
.med-item.due-now { border-color: rgba(76,175,130,0.3); background: rgba(76,175,130,0.04); }
.med-item.due-soon { border-color: rgba(232,196,74,0.25); background: rgba(232,196,74,0.03); }
.med-item.taken { opacity: 0.45; }
.med-item.taken .med-name { text-decoration: line-through; }

.med-dot {
width: 10px; height: 10px;
border-radius: 50%;
flex-shrink: 0;
margin-top: 5px;
}
.med-info { flex: 1; min-width: 0; }
.med-name {
font-weight: 600;
font-size: 15px;
color: var(–text);
margin-bottom: 2px;
}
.med-dose {
font-size: 13px;
color: var(–muted);
margin-bottom: 4px;
}
.med-time-tag {
display: inline-flex;
align-items: center;
gap: 5px;
font-family: ‘DM Mono’, monospace;
font-size: 11px;
padding: 3px 10px;
border-radius: 12px;
font-weight: 500;
}
.tag-now { background: rgba(76,175,130,0.15); color: var(–green); }
.tag-soon { background: rgba(232,196,74,0.15); color: var(–yellow); }
.tag-later { background: var(–surface2); color: var(–muted); }
.tag-taken { background: var(–surface2); color: var(–dim); }

.check-btn {
width: 34px; height: 34px;
border-radius: 50%;
border: 2px solid var(–border);
background: transparent;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: all 0.2s;
flex-shrink: 0;
font-size: 16px;
color: var(–dim);
}
.check-btn:hover { border-color: var(–green); color: var(–green); }
.check-btn.checked { background: var(–green); border-color: var(–green); color: white; }
.med-item.taken .check-btn { background: var(–surface2); border-color: var(–dim); color: var(–dim); }

.prn-note {
font-size: 11px;
font-family: ‘DM Mono’, monospace;
color: var(–accent);
background: rgba(200,169,110,0.08);
border-radius: 4px;
padding: 2px 7px;
margin-top: 4px;
display: inline-block;
}

.warning-inline {
font-size: 12px;
color: #d88;
margin-top: 6px;
display: flex;
gap: 6px;
}

/* NEXT UP card */
.next-card {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 12px;
padding: 14px 16px;
margin-bottom: 8px;
display: flex;
align-items: center;
gap: 14px;
}
.next-time {
font-family: ‘DM Mono’, monospace;
font-size: 16px;
font-weight: 600;
color: var(–accent);
flex-shrink: 0;
min-width: 72px;
}
.next-meds { flex: 1; }
.next-med-name { font-size: 14px; color: var(–text); font-weight: 500; }
.next-countdown {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
color: var(–muted);
margin-top: 2px;
}

/* FULL SCHEDULE */
.schedule-group { margin-bottom: 20px; }
.schedule-time-header {
font-family: ‘DM Mono’, monospace;
font-size: 12px;
font-weight: 600;
color: var(–accent);
margin-bottom: 8px;
display: flex;
align-items: center;
gap: 10px;
}
.schedule-time-header::after { content:’’; flex:1; height:1px; background: var(–border); }
.schedule-med {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 10px;
padding: 12px 14px;
margin-bottom: 6px;
display: flex;
align-items: center;
gap: 12px;
}
.schedule-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.schedule-name { font-size: 14px; font-weight: 500; flex: 1; }
.schedule-dose-label { font-size: 12px; color: var(–muted); font-family: ‘DM Mono’, monospace; }

/* DAY PICKER */
.day-picker {
display: flex;
overflow-x: auto;
gap: 6px;
padding-bottom: 4px;
margin-bottom: 20px;
-webkit-overflow-scrolling: touch;
scrollbar-width: none;
}
.day-picker::-webkit-scrollbar { display: none; }
.day-pill {
flex-shrink: 0;
padding: 8px 14px;
border-radius: 20px;
border: 1px solid var(–border);
background: transparent;
color: var(–muted);
font-family: ‘DM Mono’, monospace;
font-size: 12px;
cursor: pointer;
transition: all 0.15s;
white-space: nowrap;
}
.day-pill:hover { background: var(–surface2); color: var(–text); }
.day-pill.active { background: var(–accent); color: #0c0f18; border-color: var(–accent); font-weight: 600; }
.day-pill.today-pill { border-color: rgba(200,169,110,0.3); }

/* NARCAN banner */
.narcan-banner {
background: rgba(220,38,38,0.08);
border: 1px solid rgba(220,38,38,0.2);
border-radius: 10px;
padding: 12px 16px;
margin-bottom: 20px;
display: flex;
gap: 12px;
align-items: flex-start;
font-size: 13px;
color: #e88;
}

.empty { text-align: center; padding: 40px 0; color: var(–dim); font-family: ‘DM Mono’, monospace; font-size: 12px; }

.hidden { display: none; }
.view { animation: fadeUp 0.2s ease; }
@keyframes fadeUp { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(–surface2); border-radius: 2px; }
</style>

</head>
<body>

<!-- CLOCK -->

<div class="clock-hero">
  <div class="clock-label">Recovery Medication Clock</div>
  <div class="clock-time" id="clock-display">--:--<span class="ampm" id="clock-ampm">--</span></div>
  <div class="clock-date" id="clock-date">---</div>
  <div class="day-chip" id="day-chip">Loading...</div>
</div>

<!-- TABS -->

<div class="tabs">
  <button class="tab active" onclick="switchTab('now')">🕐 Now</button>
  <button class="tab" onclick="switchTab('today')">Today</button>
  <button class="tab" onclick="switchTab('schedule')">Full Schedule</button>
</div>

<div class="content">

  <!-- NARCAN always visible -->

  <div class="narcan-banner">
    <span>🚨</span>
    <div><strong>Narcan on hand?</strong> If unresponsive: 1 spray per nostril every 2 min. <strong>Call 911.</strong></div>
  </div>

  <!-- NOW VIEW -->

  <div id="view-now" class="view">
    <div class="section-label"><span class="pulse"></span> Due Now or Recently</div>
    <div id="now-list"></div>
    <div style="margin-top:24px">
      <div class="section-label">Coming Up Next</div>
      <div id="next-list"></div>
    </div>
  </div>

  <!-- TODAY VIEW -->

  <div id="view-today" class="view hidden">
    <div id="today-list"></div>
  </div>

  <!-- SCHEDULE VIEW -->

  <div id="view-schedule" class="view hidden">
    <div class="day-picker" id="day-picker"></div>
    <div id="schedule-list"></div>
  </div>

</div>

<script>
const START = new Date("2026-03-04T00:00:00");
const TOTAL_DAYS = 28;

function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function fmtDate(d) { return d.toLocaleDateString("en-US",{month:"short",day:"numeric"}); }
function fmtDateLong(d) { return d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"}); }

// Parse "8:00 AM" -> minutes since midnight
function timeToMin(str) {
  if (!str || str.includes("needed") || str.includes("PRN") || str.includes("Emergency")) return -1;
  const m = str.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return -1;
  let h = parseInt(m[1]), mn = parseInt(m[2]), ap = m[3].toUpperCase();
  if (ap === "PM" && h !== 12) h += 12;
  if (ap === "AM" && h === 12) h = 0;
  return h*60 + mn;
}

function minToStr(m) {
  const h = Math.floor(m/60) % 24, mn = m%60;
  const ap = h >= 12 ? "PM" : "AM";
  const h12 = h%12 || 12;
  return `${h12}:${String(mn).padStart(2,"0")} ${ap}`;
}

const MEDS = [
  {
    name: "Acetaminophen",
    short: "Tylenol ES",
    color: "#5b9cf6",
    prn: false,
    schedule: [
      { dose: "1,000 mg (2 tabs)", days: [0,9], times: ["8:00 AM","4:00 PM","12:00 AM"] }
    ]
  },
  {
    name: "Memantine",
    short: "Namenda",
    color: "#a78bfa",
    prn: false,
    schedule: [
      { dose: "10 mg (2 tabs)", days: [0,6], times: ["8:00 AM","8:00 PM"] },
      { dose: "5 mg (1 tab)", days: [7,13], times: ["8:00 AM","8:00 PM"] }
    ]
  },
  {
    name: "Methocarbamol",
    short: "Robaxin",
    color: "#f97316",
    prn: false,
    warning: "May cause drowsiness.",
    schedule: [
      { dose: "1,000 mg (2 tabs)", days: [0,5], times: ["8:00 AM","2:00 PM","8:00 PM"] },
      { dose: "1,000 mg (2 tabs)", days: [6,9], times: ["8:00 AM","8:00 PM"] },
      { dose: "500 mg (1 tab)", days: [10,13], times: ["8:00 AM","8:00 PM"] },
      { dose: "500 mg (1 tab)", days: [14,17], times: ["8:00 AM"] }
    ]
  },
  {
    name: "Ondansetron ODT",
    short: "Zofran ODT",
    color: "#2dd4bf",
    prn: true,
    prnNote: "Only if nauseous",
    schedule: [
      { dose: "4 mg (dissolve 1 tab)", days: [0,4], times: ["As needed every 6 hrs"] }
    ]
  },
  {
    name: "OxyCODONE",
    short: "Roxicodone",
    color: "#ef4444",
    prn: true,
    prnNote: "Only for moderate-severe pain",
    warning: "⚠ Opioid. Narcan co-prescribed.",
    schedule: [
      { dose: "10 mg (1 tab)", days: [0,1], times: ["Every 4 hrs PRN"] },
      { dose: "10 mg (1 tab)", days: [2,3], times: ["Every 6 hrs PRN"] },
      { dose: "10 mg (1 tab)", days: [4,5], times: ["Every 8 hrs PRN"] },
      { dose: "10 mg (1 tab)", days: [6,6], times: ["Every 12 hrs PRN"] },
      { dose: "5 mg (½ tab)", days: [7,7], times: ["Every 12 hrs PRN"] }
    ]
  },
  {
    name: "Senna",
    short: "Senokot",
    color: "#94a3b8",
    prn: false,
    schedule: [
      { dose: "2 tabs", days: [0,60], times: ["8:00 AM","8:00 PM"] }
    ]
  },
  {
    name: "Polyethylene Glycol",
    short: "MiraLAX",
    color: "#22c55e",
    prn: false,
    schedule: [
      { dose: "17 g (1 packet)", days: [0,13], times: ["8:00 AM"] }
    ]
  },
  {
    name: "Gabapentin",
    short: "Neurontin",
    color: "#eab308",
    warning: "May cause dizziness.",
    prn: false,
    schedule: [
      { dose: "600 mg (2 caps)", days: [0,13], times: ["8:00 AM","4:00 PM","12:00 AM"] },
      { dose: "300 mg (1 cap)", days: [14,20], times: ["8:00 AM","4:00 PM","12:00 AM"] },
      { dose: "300 mg (1 cap)", days: [21,27], times: ["10:00 PM"] }
    ]
  },
  {
    name: "Cephalexin",
    short: "Keflex",
    color: "#38bdf8",
    prn: false,
    schedule: [
      { dose: "500 mg (1 cap)", days: [0,9], times: ["8:00 AM","2:00 PM","8:00 PM","2:00 AM"] }
    ]
  },
  {
    name: "Bupropion SR",
    short: "Wellbutrin SR",
    color: "#c084fc",
    prn: false,
    schedule: [
      { dose: "100 mg (1 tab)", days: [0,60], times: ["8:00 AM","8:00 PM"] }
    ]
  }
];

// Get meds active on a given day index
function getMedsForDay(dayIdx) {
  const result = [];
  MEDS.forEach(med => {
    med.schedule.forEach(s => {
      if (dayIdx >= s.days[0] && dayIdx <= s.days[1]) {
        result.push({ med, dose: s.dose, times: s.times });
      }
    });
  });
  return result;
}

// Build dose list: [{name, short, color, dose, time, timeMin, prn, prnNote, warning}]
function getDoseList(dayIdx) {
  const doses = [];
  getMedsForDay(dayIdx).forEach(({ med, dose, times }) => {
    times.forEach(t => {
      doses.push({
        name: med.name,
        short: med.short,
        color: med.color,
        dose,
        time: t,
        timeMin: timeToMin(t),
        prn: med.prn || false,
        prnNote: med.prnNote || null,
        warning: med.warning || null
      });
    });
  });
  doses.sort((a,b) => {
    if (a.timeMin < 0 && b.timeMin < 0) return 0;
    if (a.timeMin < 0) return 1;
    if (b.timeMin < 0) return -1;
    return a.timeMin - b.timeMin;
  });
  return doses;
}

// Checked state (session)
const checked = {};
function toggleCheck(key, btn, item) {
  checked[key] = !checked[key];
  const row = btn.closest(".med-item, .schedule-med");
  if (row) row.classList.toggle("taken", checked[key]);
  btn.classList.toggle("checked", checked[key]);
  btn.textContent = checked[key] ? "✓" : "";
}

// --- CLOCK ---
function updateClock() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  const ap = h >= 12 ? "PM" : "AM";
  const h12 = h%12||12;
  document.getElementById("clock-display").innerHTML = `${h12}:${String(m).padStart(2,"0")}<span class="ampm">${ap}</span>`;
  document.getElementById("clock-date").textContent = fmtDateLong(now);

  const dayIdx = Math.floor((now - START)/(1000*60*60*24));
  if (dayIdx >= 0 && dayIdx < TOTAL_DAYS) {
    document.getElementById("day-chip").textContent = `Recovery Day ${dayIdx+1} of ${TOTAL_DAYS}`;
  } else if (dayIdx < 0) {
    document.getElementById("day-chip").textContent = `Surgery starts ${fmtDate(START)}`;
  } else {
    document.getElementById("day-chip").textContent = `Day ${dayIdx+1} · Active recovery period complete`;
  }
}

// --- NOW VIEW ---
function buildNow() {
  const now = new Date();
  const dayIdx = Math.floor((now - START)/(1000*60*60*24));
  const nowMin = now.getHours()*60 + now.getMinutes();
  const WINDOW_PAST = 60; // show as "due now" within 60 min past
  const WINDOW_SOON = 120; // show as "soon" within next 2 hrs

  const doses = getDoseList(Math.max(0, Math.min(dayIdx, TOTAL_DAYS-1)));

  const nowList = document.getElementById("now-list");
  const nextList = document.getElementById("next-list");
  nowList.innerHTML = "";
  nextList.innerHTML = "";

  const dueNow = [], comingUp = [];

  doses.forEach((d, i) => {
    if (d.timeMin < 0) {
      // PRN — always show in "now" section
      dueNow.push({ ...d, status: "prn", i });
      return;
    }
    const diff = d.timeMin - nowMin;
    if (diff >= -WINDOW_PAST && diff <= 0) {
      dueNow.push({ ...d, status: "now", i });
    } else if (diff > 0 && diff <= WINDOW_SOON) {
      dueNow.push({ ...d, status: "soon", i });
    } else if (diff > WINDOW_SOON) {
      comingUp.push({ ...d, i });
    }
  });

  if (!dueNow.length) {
    nowList.innerHTML = `<div class="empty">Nothing due right now. Check "Today" for your full schedule.</div>`;
  }

  dueNow.forEach(d => {
    const key = `now-${d.i}-${d.name}-${d.time}`;
    const isTaken = checked[key];
    let tagHtml = "";
    if (d.status === "now") tagHtml = `<span class="med-time-tag tag-now">● Now · ${d.time}</span>`;
    else if (d.status === "soon") {
      const mins = d.timeMin - nowMin;
      tagHtml = `<span class="med-time-tag tag-soon">↑ in ${mins}m · ${d.time}</span>`;
    } else {
      tagHtml = `<span class="med-time-tag tag-later">PRN</span>`;
    }

    const div = document.createElement("div");
    div.className = `med-item${d.status==="now"?" due-now":d.status==="soon"?" due-soon":""}${isTaken?" taken":""}`;
    div.innerHTML = `
      <div class="med-dot" style="background:${d.color}"></div>
      <div class="med-info">
        <div class="med-name">${d.name}</div>
        <div class="med-dose">${d.dose}</div>
        ${tagHtml}
        ${d.prn ? `<div class="prn-note">${d.prnNote || "As needed"}</div>` : ""}
        ${d.warning ? `<div class="warning-inline"><span>⚠</span><span>${d.warning}</span></div>` : ""}
      </div>
      <button class="check-btn${isTaken?" checked":""}" onclick="toggleCheck('${key}',this)">${isTaken?"✓":""}</button>`;
    nowList.appendChild(div);
  });

  // Group coming up by time
  const byTime = {};
  comingUp.forEach(d => {
    const k = d.time;
    if (!byTime[k]) byTime[k] = [];
    byTime[k].push(d);
  });

  const timeKeys = Object.keys(byTime).sort((a,b) => timeToMin(a)-timeToMin(b)).slice(0,3);
  if (!timeKeys.length) {
    nextList.innerHTML = `<div class="empty">No more scheduled doses today.</div>`;
  }
  timeKeys.forEach(t => {
    const group = byTime[t];
    const minsUntil = timeToMin(t) - nowMin;
    const card = document.createElement("div");
    card.className = "next-card";
    card.innerHTML = `
      <div class="next-time">${t}</div>
      <div class="next-meds">
        ${group.map(d => `<div class="next-med-name">${d.name} <span style="color:var(--muted);font-size:12px;font-weight:400">· ${d.dose}</span></div>`).join("")}
        <div class="next-countdown">in ${minsUntil >= 60 ? Math.floor(minsUntil/60)+"h "+((minsUntil%60)||"")+"m" : minsUntil+"m"}</div>
      </div>`;
    nextList.appendChild(card);
  });
}

// --- TODAY VIEW ---
function buildToday() {
  const now = new Date();
  const dayIdx = Math.max(0, Math.min(Math.floor((now - START)/(1000*60*60*24)), TOTAL_DAYS-1));
  const nowMin = now.getHours()*60 + now.getMinutes();
  const doses = getDoseList(dayIdx);
  const list = document.getElementById("today-list");
  list.innerHTML = "";

  // Group by time
  const byTime = {};
  const prnGroup = [];
  doses.forEach((d,i) => {
    if (d.timeMin < 0) { prnGroup.push({...d,i}); return; }
    if (!byTime[d.time]) byTime[d.time] = [];
    byTime[d.time].push({...d,i});
  });

  const timeKeys = Object.keys(byTime).sort((a,b)=>timeToMin(a)-timeToMin(b));
  timeKeys.forEach(t => {
    const group = byTime[t];
    const isPast = timeToMin(t) < nowMin - 60;
    const header = document.createElement("div");
    header.className = "schedule-group";
    const tLabel = document.createElement("div");
    tLabel.className = "schedule-time-header";
    tLabel.innerHTML = `${t}${isPast ? ' <span style="color:var(--dim);font-weight:400;font-size:10px"> · past</span>' : ""}`;
    header.appendChild(tLabel);

    group.forEach(d => {
      const key = `today-${d.i}-${d.name}-${d.time}`;
      const isTaken = checked[key];
      const div = document.createElement("div");
      div.className = `med-item${isTaken?" taken":""}`;
      div.innerHTML = `
        <div class="med-dot" style="background:${d.color}"></div>
        <div class="med-info">
          <div class="med-name">${d.name}</div>
          <div class="med-dose">${d.dose}</div>
          ${d.warning ? `<div class="warning-inline"><span>⚠</span><span>${d.warning}</span></div>` : ""}
        </div>
        <button class="check-btn${isTaken?" checked":""}" onclick="toggleCheck('${key}',this)">${isTaken?"✓":""}</button>`;
      header.appendChild(div);
    });
    list.appendChild(header);
  });

  if (prnGroup.length) {
    const header = document.createElement("div");
    header.className = "schedule-group";
    const tLabel = document.createElement("div");
    tLabel.className = "schedule-time-header";
    tLabel.textContent = "As Needed (PRN)";
    header.appendChild(tLabel);
    prnGroup.forEach(d => {
      const key = `today-prn-${d.i}-${d.name}`;
      const isTaken = checked[key];
      const div = document.createElement("div");
      div.className = `med-item${isTaken?" taken":""}`;
      div.innerHTML = `
        <div class="med-dot" style="background:${d.color}"></div>
        <div class="med-info">
          <div class="med-name">${d.name}</div>
          <div class="med-dose">${d.dose}</div>
          <div class="prn-note">${d.prnNote || "As needed"} · ${d.time}</div>
          ${d.warning ? `<div class="warning-inline"><span>⚠</span><span>${d.warning}</span></div>` : ""}
        </div>
        <button class="check-btn${isTaken?" checked":""}" onclick="toggleCheck('${key}',this)">${isTaken?"✓":""}</button>`;
      header.appendChild(div);
    });
    list.appendChild(header);
  }
}

// --- SCHEDULE VIEW ---
let scheduleDay = Math.max(0, Math.min(Math.floor((new Date() - START)/(1000*60*60*24)), TOTAL_DAYS-1));

function buildDayPicker() {
  const picker = document.getElementById("day-picker");
  picker.innerHTML = "";
  const today = Math.floor((new Date() - START)/(1000*60*60*24));
  for (let d = 0; d < TOTAL_DAYS; d++) {
    const btn = document.createElement("button");
    btn.className = `day-pill${d===scheduleDay?" active":""}${d===today?" today-pill":""}`;
    btn.textContent = `Day ${d+1} · ${fmtDate(addDays(START,d))}`;
    btn.onclick = () => {
      scheduleDay = d;
      document.querySelectorAll(".day-pill").forEach((b,i) => b.classList.toggle("active", i===d));
      buildScheduleList();
    };
    picker.appendChild(btn);
  }
  // Scroll to today
  const activePill = picker.querySelector(".active");
  if (activePill) setTimeout(() => activePill.scrollIntoView({behavior:"smooth",inline:"center",block:"nearest"}), 100);
}

function buildScheduleList() {
  const list = document.getElementById("schedule-list");
  list.innerHTML = "";
  const doses = getDoseList(scheduleDay);
  if (!doses.length) { list.innerHTML = `<div class="empty">No medications this day.</div>`; return; }

  const byTime = {};
  const prnGroup = [];
  doses.forEach((d,i) => {
    if (d.timeMin < 0) { prnGroup.push({...d,i}); return; }
    if (!byTime[d.time]) byTime[d.time] = [];
    byTime[d.time].push({...d,i});
  });

  Object.keys(byTime).sort((a,b)=>timeToMin(a)-timeToMin(b)).forEach(t => {
    const group = byTime[t];
    const grpEl = document.createElement("div");
    grpEl.className = "schedule-group";
    grpEl.innerHTML = `<div class="schedule-time-header">${t}</div>`;
    group.forEach(d => {
      const el = document.createElement("div");
      el.className = "schedule-med";
      el.innerHTML = `
        <div class="schedule-dot" style="background:${d.color}"></div>
        <div style="flex:1">
          <div class="schedule-name">${d.name}</div>
          <div class="schedule-dose-label">${d.dose}</div>
        </div>`;
      grpEl.appendChild(el);
    });
    list.appendChild(grpEl);
  });

  if (prnGroup.length) {
    const grpEl = document.createElement("div");
    grpEl.className = "schedule-group";
    grpEl.innerHTML = `<div class="schedule-time-header">As Needed (PRN)</div>`;
    prnGroup.forEach(d => {
      const el = document.createElement("div");
      el.className = "schedule-med";
      el.innerHTML = `
        <div class="schedule-dot" style="background:${d.color}"></div>
        <div style="flex:1">
          <div class="schedule-name">${d.name}</div>
          <div class="schedule-dose-label">${d.dose} · <span style="color:var(--accent)">${d.prnNote||"As needed"}</span></div>
        </div>`;
      grpEl.appendChild(el);
    });
    list.appendChild(grpEl);
  }
}

// --- TAB SWITCHING ---
function switchTab(tab) {
  ["now","today","schedule"].forEach(t => {
    document.getElementById(`view-${t}`).classList.toggle("hidden", t!==tab);
  });
  document.querySelectorAll(".tab").forEach((b,i) => {
    b.classList.toggle("active", ["now","today","schedule"][i]===tab);
  });
  if (tab==="now") buildNow();
  if (tab==="today") buildToday();
  if (tab==="schedule") { buildDayPicker(); buildScheduleList(); }
}

// --- INIT ---
updateClock();
setInterval(updateClock, 1000);
buildNow();
setInterval(buildNow, 60000); // refresh Now every minute
</script>
