server {
    listen 80;
    server_name pecksmission.com www.pecksmission.com;
    return 301 https://www.pecksmission.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pecksmission.com;

    ssl_certificate /etc/letsencrypt/live/pecksmission.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pecksmission.com/privkey.pem;

    return 301 https://www.pecksmission.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.pecksmission.com;

    ssl_certificate /etc/letsencrypt/live/pecksmission.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pecksmission.com/privkey.pem;

    client_max_body_size 16M;

    # Static files — served directly by nginx
    location /static/ {
        alias /opt/pecksmission/app/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Legacy images at root level (*.webp, *.jpg, *.jpeg, *.png, *.mp4, *.mov)
    location ~* \.(webp|jpg|jpeg|png|mp4|mov)$ {
        root /opt/pecksmission;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri @flask;
    }

    # surgery-day.html — served as static file
    location = /surgery-day.html {
        root /opt/pecksmission;
        try_files $uri @flask;
    }

    # favicon, robots, sitemap
    location = /favicon.ico { alias /opt/pecksmission/app/static/images/favicon.ico; }
    location = /apple-touch-icon.png { alias /opt/pecksmission/app/static/images/apple-touch-icon.png; }
    location = /robots.txt { root /opt/pecksmission; }
    location = /sitemap.xml { root /opt/pecksmission; }
    location = /CNAME { root /opt/pecksmission; }

    # Everything else goes to Flask
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @flask {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
